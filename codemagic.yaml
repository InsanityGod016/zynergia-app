workflows:
  ios-distribution:
    name: iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Strip web-only assets (landing animation = 27MB)
        script: rm -rf dist/animations
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 'UUID' /tmp/profile.mobileprovision | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release
      - name: Publish to TestFlight
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/api_key.p8
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa") \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --private-key @file:/tmp/api_key.p8 \
            --testflight \
            --max-find-build-wait 30
    artifacts:
      - build/ios/ipa/*.ipa

  android-verify-keystore:
    name: Verify Original Keystore Password
    max_build_duration: 5
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_credentials
      java: 21
    scripts:
      - name: Verify ANDROID_KEYSTORE + ANDROID_KEY_PASSWORD
        script: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/original.jks
          echo "=== Intentando con ANDROID_KEY_PASSWORD ==="
          keytool -list -v -keystore /tmp/original.jks -storepass "$ANDROID_KEY_PASSWORD" 2>&1 | grep -E "SHA1|SHA-256|Alias|error|Exception" | head -10
          echo "=== FIN ==="

  android-distribution:
    name: Android Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_credentials
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Strip web-only assets (landing animation = 27MB)
        script: rm -rf dist/animations
      - name: Capacitor sync
        script: npx cap sync android
      - name: Set up keystore
        script: |
          echo "$ANDROID_NEW_KEYSTORE" | base64 --decode > /tmp/zynergia-upload.jks
          # Verificar que la contraseña/alias son correctos ANTES de compilar 8 min
          keytool -list -keystore /tmp/zynergia-upload.jks -storepass "$ANDROID_NEW_PASSWORD" | head -5
      - name: Build Android App Bundle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/zynergia-upload.jks \
            -Pandroid.injected.signing.store.password=$ANDROID_NEW_PASSWORD \
            -Pandroid.injected.signing.key.alias=zynergia \
            -Pandroid.injected.signing.key.password=$ANDROID_NEW_PASSWORD
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
