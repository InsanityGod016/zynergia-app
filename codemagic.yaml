workflows:
  ios-distribution:
    name: iOS Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 'UUID' /tmp/profile.mobileprovision | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App \
            --config Release
      - name: Publish to TestFlight
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/api_key.p8
          app-store-connect publish \
            --path $(find build/ios/ipa -name "*.ipa") \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --private-key @file:/tmp/api_key.p8 \
            --testflight \
            --max-find-build-wait 30
    artifacts:
      - build/ios/ipa/*.ipa

  android-distribution:
    name: Android Distribution
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_credentials
      node: latest
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Set up Android keystore
        script: |
          echo $ANDROID_KEYSTORE | base64 --decode > /tmp/zynergia.jks
      - name: Build Android App Bundle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/zynergia.jks \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab
